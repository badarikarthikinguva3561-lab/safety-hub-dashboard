<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSCMR Secure Safety Hub</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #1a1a1a; color: white; padding: 20px; margin: 0; }
        .container { max-width: 650px; margin: auto; background: #2a2a2a; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.8); }
        
        /* Login Screen Styles */
        #login-screen { display: block; }
        .input-field { width: 80%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; font-size: 16px; }
        .btn-login { padding: 12px 30px; background: #3b82f6; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; margin-top: 10px; font-weight: bold; }
        .btn-login:hover { background: #2563eb; }
        #login-error { color: #ef4444; display: none; margin-top: 10px; font-weight: bold; }

        /* Dashboard Styles */
        #dashboard-screen { display: none; }
        img { width: 100%; border-radius: 8px; border: 3px solid #ef4444; min-height: 300px; background: #000; object-fit: contain; }
        
        .controls { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 15px; margin: 30px 0; }
        .toggle-btn { padding: 15px 25px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; flex-grow: 1; min-width: 200px; }
        .btn-off { background-color: #475569; color: white; }
        .btn-on { background-color: #ef4444; color: white; box-shadow: 0 0 15px rgba(239, 68, 68, 0.6); }
        
        /* Email Section */
        .email-section { background: #333; padding: 20px; border-radius: 8px; margin-top: 20px; border: 1px solid #444; }
        .btn-logout { background: #ef4444; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; float: right; margin-bottom: 10px; font-weight: bold; }
        #success-msg { color: #10b981; display: none; margin-top: 15px; font-weight: bold; }
        
        hr { border: 1px solid #444; margin: 25px 0; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="login-screen">
        <h2>🔒 PSCMR Admin Login</h2>
        <p>Enter your credentials to access the Safety Hub</p>
        <input type="email" id="auth-email" class="input-field" placeholder="Admin Email"><br>
        <input type="password" id="auth-password" class="input-field" placeholder="Password"><br>
        <button class="btn-login" onclick="loginAdmin()">Login</button>
        <div id="login-error">Invalid Email or Password</div>
    </div>

    <div id="dashboard-screen">
        <button class="btn-logout" onclick="logoutAdmin()">Logout</button>
        <h2>🛰️ Remote Hazard Monitor</h2>
        <p>Live Threat Visualizer</p>
        
        <img id="live-camera" src="https://via.placeholder.com/600x400?text=SYSTEM+SAFE+-+NO+ALERTS" alt="Live Camera Feed">

        <hr>
        
        <h3>⚙️ Hardware Overrides</h3>
        <div class="controls">
            <button id="fan-btn" class="toggle-btn btn-off" onclick="toggleHardware('fan')">Exhaust Fan: OFF</button>
            <button id="light-btn" class="toggle-btn btn-off" onclick="toggleHardware('light')">Strobe Light: OFF</button>
        </div>

        <hr>

        <div class="email-section">
            <h3>📬 Subscribe to Emergency Alerts</h3>
            <p style="font-size: 14px; color: #ccc;">Add an email to the emergency broadcast list.</p>
            <form id="email-form">
                <input type="email" id="email-input" class="input-field" style="width: 70%;" placeholder="Enter user email address" required>
                <button type="submit" class="btn-login" style="margin: 0; padding: 12px 20px;">Add</button>
            </form>
            <div id="success-msg">✅ Success! Email added to Google Sheet.</div>
        </div>
    </div>

</div>

<script>
    // --- FIREBASE CONFIGURATION ---
    const firebaseConfig = {
        apiKey: "AIzaSyAq8jGLPA-hsAsNjAPXd_oSqQfKEdDkWcA",
        authDomain: "fire-and-gas-alert-system.firebaseapp.com",
        databaseURL: "https://fire-and-gas-alert-system-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "fire-and-gas-alert-system",
        storageBucket: "fire-and-gas-alert-system.firebasestorage.app",
        messagingSenderId: "678355474003",
        appId: "1:678355474003:web:e6b8fbc0afa7d79bbad8a6"
    };
    
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    // --- AUTHENTICATION LOGIC ---
    function loginAdmin() {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-password').value;
        
        auth.signInWithEmailAndPassword(email, pass)
            .catch((error) => {
                document.getElementById('login-error').style.display = 'block';
                document.getElementById('login-error').innerText = error.message;
            });
    }

    function logoutAdmin() {
        auth.signOut();
    }

    // Monitor Auth State (Shows/Hides Dashboard automatically)
    auth.onAuthStateChanged((user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard-screen').style.display = 'block';
            startDashboardListeners(); // Only load data if logged in
        } else {
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('dashboard-screen').style.display = 'none';
        }
    });

    // --- DASHBOARD DATA LOGIC ---
    function startDashboardListeners() {
        // 1. Image Auto-Updater (Listens to the exact path used by your Google Apps Script)
        database.ref('system_state/latest_image').on('value', (snapshot) => {
            const imageUrl = snapshot.val();
            if (imageUrl) {
                document.getElementById('live-camera').src = imageUrl;
            }
        });

        // 2. Hardware Toggles Reader
        ['fan', 'light'].forEach(device => {
            database.ref('hardware/' + device).on('value', (snapshot) => {
                const state = snapshot.val();
                const btn = document.getElementById(device + '-btn');
                if (state === true) {
                    btn.className = 'toggle-btn btn-on';
                    btn.innerText = (device === 'fan' ? 'Exhaust Fan' : 'Strobe Light') + ': ON';
                } else {
                    btn.className = 'toggle-btn btn-off';
                    btn.innerText = (device === 'fan' ? 'Exhaust Fan' : 'Strobe Light') + ': OFF';
                }
            });
        });
    }

    // Hardware Toggle Sender (Pushes to Firebase, ESP32 will read this later)
    function toggleHardware(device) {
        const ref = database.ref('hardware/' + device);
        ref.once('value').then((snapshot) => {
            const currentState = snapshot.val() || false;
            ref.set(!currentState); 
        });
    }

    // --- GOOGLE APPS SCRIPT EMAIL SUBMISSION ---
    // ⚠️ Ensure this is your most recent Web App URL
    const googleScriptUrl = "https://script.google.com/macros/s/AKfycbydQafVlc5MA1BdochHFu80LFuo2ZGq3eJFVOkOjxJZHRiJZRvM2Rgt0iI22Aa9gBektA/exec";

    document.getElementById('email-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const emailInput = document.getElementById('email-input');
        const email = emailInput.value;
        const btn = this.querySelector('button');
        
        btn.innerText = "Sending...";
        btn.disabled = true;
        
        // 🚨 mode: 'no-cors' prevents browser security blocks when posting to Google Scripts
        fetch(googleScriptUrl, {
            method: 'POST',
            mode: 'no-cors', 
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'email=' + encodeURIComponent(email)
        }).then(() => {
            // no-cors means we get an opaque response, so we assume success if no network error thrown
            document.getElementById('success-msg').style.display = 'block';
            emailInput.value = '';
            btn.innerText = "Add";
            btn.disabled = false;
            setTimeout(() => { document.getElementById('success-msg').style.display = 'none'; }, 4000);
        }).catch(err => {
            alert("Network error. Could not reach Google Sheets.");
            btn.innerText = "Add";
            btn.disabled = false;
        });
    });
</script>

</body>
</html>
