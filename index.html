<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PSCMR Safety Hub — Remote Control</title>
<style>
  :root {
    --bg: #0b0e11;
    --panel: #14181d;
    --panel-2: #1b2027;
    --line: #262c34;
    --text: #edeff2;
    --text-dim: #8b95a1;
    --amber: #f5a623;
    --amber-dim: #6b4b12;
    --red: #e5484d;
    --red-dim: #4a1616;
    --green: #3ecf8e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 24px 16px 60px;
  }
  .wrap { max-width: 560px; margin: 0 auto; }

  /* ---------- LOGIN SCREEN ---------- */
  #loginScreen {
    max-width: 360px;
    margin: 80px auto 0;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 28px 24px;
  }
  #loginScreen .brand {
    font-family: 'Oswald', 'Arial Narrow', sans-serif;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-size: 18px;
    text-align: center;
    margin-bottom: 4px;
  }
  #loginScreen .brand span { color: var(--amber); }
  #loginScreen .sub {
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 22px;
  }
  .field-label {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
    display: block;
  }
  .field-input {
    width: 100%;
    padding: 11px 12px;
    border-radius: 4px;
    border: 1px solid var(--line);
    background: var(--panel-2);
    color: var(--text);
    font-size: 14px;
    margin-bottom: 14px;
    outline: none;
  }
  .field-input:focus { border-color: var(--amber); }
  #loginBtn {
    width: 100%;
    padding: 12px;
    border-radius: 4px;
    border: 1px solid var(--amber);
    background: var(--amber-dim);
    color: var(--amber);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
  }
  #loginBtn:disabled { opacity: 0.5; cursor: wait; }
  #loginError {
    display: none;
    background: var(--red-dim);
    border: 1px solid var(--red);
    color: #ffb4b4;
    padding: 9px 12px;
    border-radius: 4px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 14px;
  }
  #logoutBtn {
    background: none;
    border: 1px solid var(--line);
    color: var(--text-dim);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    padding: 6px 10px;
    border-radius: 3px;
    cursor: pointer;
  }
  /* ------------------------------------ */

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .brand {
    font-family: 'Oswald', 'Arial Narrow', sans-serif;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-size: 18px;
  }
  .brand span { color: var(--amber); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .conn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    color: var(--text-dim);
    padding: 5px 10px;
    border: 1px solid var(--line);
    border-radius: 3px;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-dim);
  }
  .dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.offline { background: var(--red); }

  .alert-banner {
    display: none;
    background: var(--red-dim);
    border: 1px solid var(--red);
    color: #ffb4b4;
    padding: 10px 14px;
    border-radius: 4px;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 20px;
    align-items: center;
    justify-content: space-between;
  }
  .alert-banner a { color: #ffb4b4; }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 28px 0 10px;
  }

  .relay-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .relay-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .relay-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .relay-name {
    font-weight: 500;
    font-size: 15px;
  }
  .relay-sub {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }
  .led {
    width: 10px; height: 10px; border-radius: 50%;
    background: #333;
    border: 1px solid #000;
  }
  .led.on { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
  .led.pending { background: var(--text-dim); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .switch-btn {
    width: 100%;
    padding: 12px;
    border-radius: 4px;
    border: 1px solid var(--line);
    background: var(--panel-2);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .switch-btn:active { transform: scale(0.98); }
  .switch-btn.on {
    background: var(--amber-dim);
    border-color: var(--amber);
    color: var(--amber);
  }
  .switch-btn:disabled { opacity: 0.5; cursor: wait; }

  .telemetry-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .metric-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 14px;
  }
  .metric-label {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .metric-value {
    font-size: 22px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }
  .metric-value.safe { color: var(--green); }
  .metric-value.warn { color: var(--red); }

  .image-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 12px;
    margin-top: 12px;
    display: none;
  }
  .image-card img {
    width: 100%;
    border-radius: 4px;
    display: block;
  }
  .image-caption {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 8px;
  }

  .footer-note {
    margin-top: 32px;
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>

<!-- ===================== LOGIN SCREEN ===================== -->
<div id="loginScreen">
  <div class="brand">PSCMR <span>SAFETY HUB</span></div>
  <div class="sub">Sign in to access remote control</div>
  <div id="loginError"></div>
  <label class="field-label">Email</label>
  <input type="email" id="loginEmail" class="field-input" placeholder="you@example.com" autocomplete="username">
  <label class="field-label">Password</label>
  <input type="password" id="loginPassword" class="field-input" placeholder="••••••••" autocomplete="current-password">
  <button id="loginBtn" onclick="doLogin()">Sign in</button>
</div>
<!-- =========================================================== -->

<div class="wrap" id="dashboard" style="display:none;">

  <div class="topbar">
    <div class="brand">PSCMR <span>SAFETY HUB</span></div>
    <div class="topbar-right">
      <div class="conn"><span class="dot" id="connDot"></span><span id="connText">Connecting…</span></div>
      <button id="logoutBtn" onclick="doLogout()">Sign out</button>
    </div>
  </div>

  <div class="alert-banner" id="alertBanner">
    <span id="alertText"></span>
  </div>

  <div class="section-label">Relay control</div>
  <div class="relay-grid">
    <div class="relay-card">
      <div class="relay-head">
        <div>
          <div class="relay-name">Exhaust fan</div>
          <div class="relay-sub">RELAY 1</div>
        </div>
        <div class="led" id="led1"></div>
      </div>
      <button class="switch-btn" id="btn1" onclick="toggleRelay(1)">Turn on</button>
    </div>
    <div class="relay-card">
      <div class="relay-head">
        <div>
          <div class="relay-name">Strobe light</div>
          <div class="relay-sub">RELAY 2</div>
        </div>
        <div class="led" id="led2"></div>
      </div>
      <button class="switch-btn" id="btn2" onclick="toggleRelay(2)">Turn on</button>
    </div>
  </div>

  <div class="section-label">Live telemetry</div>
  <div class="telemetry-grid">
    <div class="metric-card">
      <div class="metric-label">Gas level (MQ-2)</div>
      <div class="metric-value safe" id="gasValue">—</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Last alert</div>
      <div class="metric-value" id="alertValue" style="font-size:16px;">None</div>
    </div>
  </div>

  <div class="image-card" id="imageCard">
    <img id="latestImage" src="" alt="Latest capture from hazard camera">
    <div class="image-caption">Latest capture from hazard event</div>
  </div>

  <div class="footer-note">Updates every 3s · Firebase Realtime Database</div>
</div>

<!-- Firebase SDKs (compat build — simplest drop-in for Auth + no build step) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
  const FIREBASE_URL = "https://fire-and-gas-alert-system-default-rtdb.asia-southeast1.firebasedatabase.app";
  const FIREBASE_SECRET = "RppTvvRdF0NArjTxeAZIr2vJWaCOZ6L7S5xuYNrm";

  // ---------- FIREBASE AUTH CONFIG ----------
  // Fill in apiKey from Firebase Console → Project Settings → General → Web API Key
  const firebaseConfig = {
     apiKey: "AIzaSyAq8jGLPA-hsAsNjAPXd_oSqQfKEdDkWcA",
  authDomain: "fire-and-gas-alert-system.firebaseapp.com",
  databaseURL: "https://fire-and-gas-alert-system-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "fire-and-gas-alert-system",
  storageBucket: "fire-and-gas-alert-system.firebasestorage.app",
  messagingSenderId: "678355474003",
  appId: "1:678355474003:web:e6b8fbc0afa7d79bbad8a6"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  // --------------------------------------------

  function doLogin() {
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value;
    const btn = document.getElementById("loginBtn");
    const errBox = document.getElementById("loginError");
    errBox.style.display = "none";

    if (!email || !password) {
      errBox.textContent = "Enter both email and password.";
      errBox.style.display = "block";
      return;
    }

    btn.disabled = true;
    btn.textContent = "Signing in…";

    auth.signInWithEmailAndPassword(email, password)
      .catch((err) => {
        errBox.textContent = err.message || "Sign in failed.";
        errBox.style.display = "block";
      })
      .finally(() => {
        btn.disabled = false;
        btn.textContent = "Sign in";
      });
  }

  function doLogout() {
    auth.signOut();
  }

  auth.onAuthStateChanged((user) => {
    if (user) {
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      startDashboard();
    } else {
      document.getElementById("loginScreen").style.display = "block";
      document.getElementById("dashboard").style.display = "none";
      stopDashboard();
    }
  });

  // ===================== EXISTING DASHBOARD LOGIC (unchanged) =====================
  let pending1 = false;
  let pending2 = false;
  let lastKnown1 = false;
  let lastKnown2 = false;
  let pollTimer = null;

  async function fbGet(path) {
    const res = await fetch(`${FIREBASE_URL}/${path}.json?auth=${FIREBASE_SECRET}`);
    if (!res.ok) throw new Error("fetch failed");
    return res.json();
  }

  async function fbPatch(path, body) {
    const res = await fetch(`${FIREBASE_URL}/${path}.json?auth=${FIREBASE_SECRET}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    return res.ok;
  }

  async function toggleRelay(num) {
    const desired = num === 1 ? !lastKnown1 : !lastKnown2;
    if (num === 1) { pending1 = true; } else { pending2 = true; }
    renderRelays();
    await fbPatch("relay_control", { ["relay" + num]: desired });
  }

  function renderRelays() {
    const btn1 = document.getElementById("btn1");
    const btn2 = document.getElementById("btn2");
    const led1 = document.getElementById("led1");
    const led2 = document.getElementById("led2");

    led1.className = "led" + (pending1 ? " pending" : lastKnown1 ? " on" : "");
    led2.className = "led" + (pending2 ? " pending" : lastKnown2 ? " on" : "");

    btn1.textContent = lastKnown1 ? "Turn off" : "Turn on";
    btn2.textContent = lastKnown2 ? "Turn off" : "Turn on";
    btn1.className = "switch-btn" + (lastKnown1 ? " on" : "");
    btn2.className = "switch-btn" + (lastKnown2 ? " on" : "");
    btn1.disabled = pending1;
    btn2.disabled = pending2;
  }

  async function poll() {
    try {
      const [status, state] = await Promise.all([
        fbGet("relay_status").catch(() => null),
        fbGet("system_state").catch(() => null)
      ]);

      if (status) {
        if (pending1 && status.relay1 !== undefined && status.relay1 === lastKnown1) {
          // still catching up, keep pending
        } else {
          pending1 = false;
        }
        if (pending2 && status.relay2 !== undefined && status.relay2 === lastKnown2) {
          // still catching up
        } else {
          pending2 = false;
        }
        lastKnown1 = !!status.relay1;
        lastKnown2 = !!status.relay2;
      }
      renderRelays();

      const connDot = document.getElementById("connDot");
      const connText = document.getElementById("connText");
      const lastSeen = state && state.telemetry_last_seen ? state.telemetry_last_seen : 0;
      const online = Date.now() - lastSeen < 15000;
      connDot.className = "dot " + (online ? "online" : "offline");
      connText.textContent = online ? "Hub online" : "Hub offline";

      const gasValue = document.getElementById("gasValue");
      const gas = state && state.gas_level !== undefined ? state.gas_level : null;
      gasValue.textContent = gas !== null ? gas : "—";
      gasValue.className = "metric-value " + (gas !== null && gas > 2000 ? "warn" : "safe");

      const alertValue = document.getElementById("alertValue");
      const alertBanner = document.getElementById("alertBanner");
      const alertText = document.getElementById("alertText");
      const type = state && state.alert_type ? state.alert_type : null;
      alertValue.textContent = type || "None";

      if (type && lastSeen && Date.now() - lastSeen < 60000) {
        alertBanner.style.display = "flex";
        alertText.textContent = type + " alert active — check site immediately";
      } else {
        alertBanner.style.display = "none";
      }

      const imageCard = document.getElementById("imageCard");
      const latestImage = document.getElementById("latestImage");
      if (state && state.latest_image && state.latest_image.startsWith("http")) {
        latestImage.src = state.latest_image;
        imageCard.style.display = "block";
      }
    } catch (e) {
      document.getElementById("connText").textContent = "Connection error";
      document.getElementById("connDot").className = "dot offline";
    }
  }

  function startDashboard() {
    renderRelays();
    poll();
    if (!pollTimer) pollTimer = setInterval(poll, 3000);
  }

  function stopDashboard() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  }
  // ===================================================================================
</script>
</body>
</html>
